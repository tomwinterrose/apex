services:
  apex:
    image: ghcr.io/tomwinterrose/apex:latest
    ports:
      - "9198:9198"
    volumes:
      # Deliberately kept as "vroomarr-data", not renamed to match the
      # service — Compose treats a volume name change as a NEW empty volume,
      # which would orphan any existing install's database. If you're
      # migrating an existing vroomarr deployment, keep this name; only use
      # "apex-data" for a genuinely fresh install.
      - vroomarr-data:/app/data
    environment:
      - DISPATCHARR_URL=${DISPATCHARR_URL:-}
      - TSDB_API_KEY=${TSDB_API_KEY:-1}
      - TSDB_PREMIUM=${TSDB_PREMIUM:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  vroomarr-data:
