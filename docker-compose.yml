services:
  apex:
    image: ghcr.io/tomwinterrose/apex:latest
    ports:
      - "9198:9198"
    volumes:
      # Migrating an existing vroomarr deployment? Compose treats a volume
      # name change as a NEW empty volume, which would orphan your existing
      # database — point this at your prior volume name (e.g.
      # "vroomarr-data") instead of changing it here.
      - apex-data:/app/data
    environment:
      - DISPATCHARR_URL=${DISPATCHARR_URL:-}
      - TSDB_API_KEY=${TSDB_API_KEY:-1}
      - TSDB_PREMIUM=${TSDB_PREMIUM:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  apex-data:
