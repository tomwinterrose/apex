services:
  vroomarr:
    build: .
    ports:
      - "9198:9198"
    environment:
      # Required for WEC/IMSA via TheSportsDB.
      # Free public key is "1" or "2" — 30 req/min, season data only.
      # Set TSDB_PREMIUM=1 if you have a premium key.
      - TSDB_API_KEY=${TSDB_API_KEY:-1}
      - TSDB_PREMIUM=${TSDB_PREMIUM:-}

      # Fallback race duration (hours) when the event name has no duration
      # and the league has no per-league default (e.g. a sprint race).
      - DEFAULT_RACE_HOURS=${DEFAULT_RACE_HOURS:-3.0}

      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9198/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
