services:
  vroomarr:
    build: .
    ports:
      - "9198:9198"
    volumes:
      - vroomarr-data:/app/data
    environment:
      - DISPATCHARR_URL=${DISPATCHARR_URL:-}
      - TSDB_API_KEY=${TSDB_API_KEY:-1}
      - TSDB_PREMIUM=${TSDB_PREMIUM:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped

volumes:
  vroomarr-data:
